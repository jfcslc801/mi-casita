<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kitchen View</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Kitchen Order View</h1>
  <div id="kitchen-order">
    <p>No order yet.</p>
  </div>
  <button onclick="clearOrder()">Complete Order</button>

  <script>
    const order = JSON.parse(localStorage.getItem("order"));
    const container = document.getElementById("kitchen-order");

    if (order) {
      let html = `<h3>Customer: ${order.name}</h3><ul>`;
      order.items.forEach(item => {
        html += `<li>${item.quantity} x ${item.name}</li>`;
      });
      html += `</ul><p><strong>Total:</strong> $${order.total.toFixed(2)}</p>`;
      container.innerHTML = html;
    }

    function clearOrder() {
      localStorage.removeItem("order");
      container.innerHTML = "<p>Order completed and cleared.</p>";
    }
  </script>
</body>
</html>
