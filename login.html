<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Mi Casita</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Welcome to Mi Casita</h1>
  <form id="login-form">
    <input type="text" id="login-name" placeholder="Enter your name" required />
    <input type="text" id="login-phone" placeholder="Enter your phone number" required />
    <button type="submit">Enter</button>
  </form>

  <script>
    document.getElementById("login-form").addEventListener("submit", function(e) {
      e.preventDefault();
      const name = document.getElementById("login-name").value.trim();
      const phone = document.getElementById("login-phone").value.trim();

      localStorage.setItem("userName", name);
      localStorage.setItem("userPhone", phone);

      if (name.toLowerCase() === "grace" && phone === "8013474922") {
        window.location.href = "kitchen.html";
      } else {
        window.location.href = "index.html";
      }
    });
  </script>
</body>
</html>
